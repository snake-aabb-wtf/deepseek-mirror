<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek 镜像站 - 登录</title>
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>DeepSeek <span class="accent">镜像站</span></h1>
      <p>请输入账号密码以继续</p>
    </div>
    <div class="flash" id="flash" style="display:none"></div>
    <form method="POST" action="/sign_in">
      <div class="form-group">
        <label for="username">账号</label>
        <input type="text" id="username" name="username" placeholder="请输入账号" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" required>
      </div>
      <button type="submit" class="login-btn">登 录</button>
    </form>
    <div class="link"><a href="/sign_up">还没有账号？立即注册</a></div>
    <div class="footer">DeepSeek 镜像站 &middot; 仅供内部使用</div>
  </div>
  <script>
    // [PR-4.5] 读 ?flash=&msg= 显示一次性提示
    (function () {
      const p = new URLSearchParams(location.search);
      const t = p.get('flash'), m = p.get('msg');
      if (t && m) {
        const el = document.getElementById('flash');
        el.className = 'flash ' + t;
        el.textContent = m;
        el.style.display = '';
        // 清空 URL 防止刷新重复显示
        history.replaceState(null, '', location.pathname);
      }
    })();
  </script>
</body>
</html>
