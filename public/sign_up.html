<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek 镜像站 - 注册</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #0f0f1a 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: rgba(30, 30, 50, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .logo {
      text-align: center;
      margin-bottom: 36px;
    }
    .logo h1 { color: #fff; font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .logo p { color: rgba(255, 255, 255, 0.5); font-size: 14px; margin-top: 8px; }
    .logo .accent { color: #4f8cff; }
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block; color: rgba(255, 255, 255, 0.7);
      font-size: 14px; margin-bottom: 8px; font-weight: 500;
    }
    .form-group input {
      width: 100%; padding: 14px 16px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px; color: #fff; font-size: 15px; outline: none;
      transition: all 0.2s;
    }
    .form-group input:focus {
      border-color: #4f8cff; background: rgba(79, 140, 255, 0.06);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.15);
    }
    .form-group input::placeholder { color: rgba(255, 255, 255, 0.25); }
    .login-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #4f8cff, #6c5ce7);
      border: none; border-radius: 12px; color: #fff;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; margin-top: 8px;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(79, 140, 255, 0.3);
    }
    .login-btn:active { transform: translateY(0); }
    .footer { text-align: center; margin-top: 24px; color: rgba(255, 255, 255, 0.3); font-size: 12px; }
    .link { text-align: center; margin-top: 16px; }
    .link a { color: #4f8cff; text-decoration: none; font-size: 14px; }
    .link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>DeepSeek <span class="accent">镜像站</span></h1>
      <p>创建新账号</p>
    </div>
    <form method="POST" action="/sign_up">
      <div class="form-group">
        <label for="username">账号</label>
        <input type="text" id="username" name="username" placeholder="请输入账号" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码（至少4位）" required>
      </div>
      <div class="form-group">
        <label for="confirm_password">确认密码</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="再次输入密码" required>
      </div>
      <button type="submit" class="login-btn">注 册</button>
    </form>
    <div class="link"><a href="/sign_in">已有账号？立即登录</a></div>
    <div class="footer">DeepSeek 镜像站 &middot; 仅供内部使用</div>
  </div>
</body>
</html>
