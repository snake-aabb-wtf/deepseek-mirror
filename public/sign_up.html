<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DeepSeek 镜像站 - 注册</title>
  <link rel="stylesheet" href="/auth.css">
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <h1>DeepSeek <span class="accent">镜像站</span></h1>
      <p>创建新账号</p>
    </div>
    <div class="flash" id="flash" style="display:none"></div>
    <form method="POST" action="/sign_up">
      <div class="form-group">
        <label for="username">账号</label>
        <input type="text" id="username" name="username" placeholder="请输入账号" required autofocus>
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码（至少10位，含大小写字母与数字）" required minlength="10">
      </div>
      <div class="form-group">
        <label for="confirm_password">确认密码</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="再次输入密码" required>
      </div>
      <button type="submit" class="login-btn">注 册</button>
    </form>
    <div class="link"><a href="/sign_in">已有账号？立即登录</a></div>
    <div class="footer">DeepSeek 镜像站 &middot; 仅供内部使用</div>
  </div>
  <script>
    (function () {
      const p = new URLSearchParams(location.search);
      const t = p.get('flash'), m = p.get('msg');
      if (t && m) {
        const el = document.getElementById('flash');
        el.className = 'flash ' + t;
        el.textContent = m;
        el.style.display = '';
        history.replaceState(null, '', location.pathname);
      }
    })();
  </script>
</body>
</html>
